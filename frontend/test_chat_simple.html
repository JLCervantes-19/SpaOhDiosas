<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Chat Simple</title>
  <link rel="stylesheet" href="css/spa.css">
</head>
<body style="background: #FAF8F5; padding: 20px;">
  
  <h1 style="text-align: center; color: #2C4A2E;">Test del Chatbot</h1>
  <p style="text-align: center; color: #666;">El botón de chat debería aparecer en la esquina inferior derecha</p>

  <!-- Chat Container -->
  <div id="chat-container"></div>

  <script type="module">
    // Importar el chat
    import { initChat } from './js/chat.js'
    
    // Inicializar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Inicializando chat...')
      try {
        const chat = initChat()
        console.log('Chat inicializado correctamente:', chat)
      } catch (error) {
        console.error('Error al inicializar chat:', error)
      }
    })
  </script>

</body>
</html>
